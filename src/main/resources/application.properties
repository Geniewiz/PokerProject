spring.application.name=holdem

spring.datasource.url=jdbc:h2:mem:holdem;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=false

holdem.redis.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.session.store-type=none
spring.docker.compose.enabled=false

spring.h2.console.enabled=true

logging.level.org.springframework.web.socket=INFO
logging.pattern.level=%5p [traceId:%X{traceId}]

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

holdem.game.auto-next-hand.enabled=true
holdem.game.auto-next-hand.delay-ms=2200
